<div class="container-fluid py-3">
  <!-- HEADER -->
  <div class="row align-items-start mb-3">
    <div class="col-md-6">
      <h2 class="company-name">{{ headCompanyName }}</h2>
      <div class="d-flex gap-3">
        <span class="company-email">{{ userName }}</span>
        <span class="breadcrumb-date">{{ today | date: "dd-MM-yyyy" }}</span>
      </div>
    </div>

    <div class="col-md-6 d-flex justify-content-md-end">
      <h6 class="breadcrumb">
        <i class="bi bi-house-fill me-1"></i> Home
        <i class="bi bi-chevron-right mx-2"></i>
        <i class="bi bi-layers-fill me-1"></i> Author
        <i class="bi bi-chevron-right mx-2"></i>
        <i class="bi bi-person-fill me-1"></i> Change Password
      </h6>
    </div>
  </div>

  <!-- CARD -->
  <div class="cp-card shadow">
    <!-- REQUIREMENTS -->
    <div class="requirements-section text-white text-center p-4">
      <h4 class="fw-bold mb-3">
        Password <span class="text-highlight">Requirements</span>
      </h4>

      <ul class="list-unstyled req-list d-inline-block text-start">
        <li [class.text-highlight]="hasNumber">● Must contain number</li>

        <li [class.text-highlight]="hasLength">● Minimum 8 characters</li>

        <li [class.text-highlight]="hasSpecial">● One special character</li>

        <li [class.text-highlight]="noRepeat">● No repeated characters</li>
      </ul>
    </div>

    <!-- FORM -->
    <div class="form-section p-4">
      <div *ngIf="!success">
        <h4 class="fw-bold mb-4 text-center">CHANGE PASSWORD</h4>

        <div class="row justify-content-center">
          <div class="col-md-6 mb-3">
            <label>User ID</label>
            <input
              class="form-control custom-input"
              [(ngModel)]="form.userId"
              readonly
            />
          </div>

          <div class="col-md-6 mb-3">
            <label>Employee Code</label>
            <input
              class="form-control custom-input"
              [(ngModel)]="form.employeeCode"
              readonly
            />
          </div>

          <div class="col-md-6 mb-3">
            <label>Username</label>
            <input
              class="form-control custom-input"
              [(ngModel)]="form.userName"
            />
          </div>

          <div class="col-md-6 mb-3">
            <label>New Password</label>
            <input
              type="password"
              class="form-control custom-input"
              [(ngModel)]="form.newPassword"
            />
          </div>

          <div class="col-md-6 mb-3">
            <label>Confirm Password</label>
            <input
              type="password"
              class="form-control custom-input"
              [(ngModel)]="form.confirmPassword"
            />
          </div>
        </div>

        <div class="text-center">
          <button
            class="btn btn-success-light px-5 mt-3"
            [disabled]="
              !form.newPassword || form.newPassword !== form.confirmPassword
            "
            (click)="changePassword()"
          >
            CHANGE PASSWORD
          </button>
        </div>
      </div>

      <!-- SUCCESS -->
      <div *ngIf="success" class="text-center py-5">
        <div class="display-4 text-success mb-3">✅</div>
        <h2 class="fw-bold">SUCCESS</h2>
        <p>Password has been reset successfully</p>
        <button class="btn btn-success-light mt-3" (click)="goBack()">
          Back
        </button>
      </div>
    </div>
  </div>
</div>
